<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Integrated Field Marketing Framework — Jason Singh</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{--purple:#7D2AE7;--purple-light:#EEEDFE;--purple-mid:#ccc8f0;--purple-dark:#3C3489;--teal:#07B9CE;--teal-light:#e5f8fa;--teal-mid:#a3e5ea;--teal-dark:#085041;--blue:#2A89DA;--blue-light:#E6F1FB;--text:#1a1a1e;--text-2:#444;--text-3:#666;--text-4:#999;--bg:#fff;--bg-2:#f9f9f7;--border:#e4e4e4;--border-light:#f0f0ee}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 40px}
nav .nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
nav .nav-name{font-size:13px;font-weight:500}nav .nav-name span{color:var(--purple);font-weight:600}
nav ul{list-style:none;display:flex;gap:6px}
nav a{font-size:11px;font-weight:500;color:var(--text-3);text-decoration:none;padding:6px 12px;border-radius:6px;transition:all .2s}
nav a:hover,nav a.active{background:var(--purple-light);color:var(--purple-dark)}
main{max-width:960px;margin:0 auto;padding:0 40px}
